<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #080808;
            color: #f0f0f0;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(29,185,84,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(29,185,84,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            text-align: center;
            padding: 64px 80px;
            background: #111;
            border: 1px solid #222;
            border-radius: 24px;
            max-width: 480px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        .icon {
            font-size: 3em;
            margin-bottom: 24px;
        }

        .eyebrow {
            font-size: 0.7em;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #1DB954;
            font-weight: 500;
            margin-bottom: 12px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5em;
            line-height: 0.95;
            margin-bottom: 16px;
            letter-spacing: 0.02em;
        }

        h1 span { color: #1DB954; }

        p {
            color: #888;
            font-size: 0.9em;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #1DB954;
            color: #000;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.95em;
            padding: 16px 36px;
            border-radius: 999px;
            text-decoration: none;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            background: #1ed760;
            transform: scale(1.04);
        }

        .disclaimer {
            margin-top: 24px;
            font-size: 0.72em;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎵</div>
        <div class="eyebrow">Listening Stats</div>
        <h1>YOUR <span>SPOTIFY</span> WRAPPED</h1>
        <p>See your top artists and tracks from the last 6 months. Log in with Spotify to get started.</p>
        <a href="/login" class="btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
            </svg>
            Login with Spotify
        </a>
        <p class="disclaimer">We only read your listening data. Nothing is stored.</p>
    </div>
</body>
</html>
